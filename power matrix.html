<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Matrix</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --accent: #c8a96e;
    --accent2: #8ab4d4;
    --text: #e8e8e8;
    --muted: #777;
    --current: #c8a96e18;
    --current-border: #c8a96e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 200;
  }

  .header-left h1 {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .header-left p {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  .header-right {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* ── TAB BAR ── */
  .tab-bar {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 57px;
    z-index: 190;
  }

  .tab {
    flex: 1;
    padding: 11px 0;
    text-align: center;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── SHARED BUTTONS ── */
  .btn {
    padding: 7px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  input[type=text] {
    padding: 7px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 0.72rem;
    width: 130px;
  }
  input[type=text]:focus { outline: none; border-color: var(--accent2); }
  input[type=text]::placeholder { color: var(--muted); }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ══════════════════════════════
     THIS WEEK VIEW
  ══════════════════════════════ */
  .week-view {
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
  }

  .week-header {
    margin-bottom: 20px;
  }

  .week-header h2 {
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .week-header p {
    font-size: 0.7rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .no-position {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 0.78rem;
    line-height: 2;
  }

  .no-position span {
    display: block;
    font-size: 1.6rem;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  /* lift cards */
  .lift-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
  }

  .lift-card {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .lift-card-header {
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .lift-name {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .lift-cell-badge {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .lift-day-tag {
    font-size: 0.58rem;
    padding: 2px 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* Strong-style set rows */
  .strong-table {
    width: 100%;
    border-collapse: collapse;
  }

  .strong-table th {
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 7px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .strong-table th:last-child { text-align: right; }

  .strong-table td {
    padding: 7px 14px;
    font-size: 0.78rem;
    border-bottom: 1px solid #1e1e1e;
  }

  .strong-table td:last-child { text-align: right; font-weight: 700; }

  .strong-table tr:last-child td { border-bottom: none; }

  .tag-endurance { color: #6db88a; font-size: 0.6rem; letter-spacing: 0.05em; }
  .tag-strength  { color: #d48080; font-size: 0.6rem; letter-spacing: 0.05em; }
  .tag-power     { color: var(--accent); font-size: 0.6rem; letter-spacing: 0.05em; }
  .tag-backoff   { color: var(--accent2); font-size: 0.6rem; letter-spacing: 0.05em; }

  .copy-hint {
    padding: 8px 14px;
    font-size: 0.62rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .copy-btn {
    font-size: 0.62rem;
    padding: 3px 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.12s;
  }
  .copy-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .copy-btn.copied { color: #6db88a; border-color: #6db88a; }

  /* progress strip */
  .progress-strip {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 18px;
  }

  .progress-cell {
    background: var(--surface);
    padding: 10px 14px;
    font-size: 0.7rem;
  }

  .progress-cell label {
    display: block;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .progress-cell strong {
    color: var(--accent);
    font-size: 0.9rem;
  }

  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    margin-top: 5px;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }

  /* nav row */
  .week-nav {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 18px;
    flex-wrap: wrap;
  }

  .week-nav-spacer { flex: 1; }

  /* ══════════════════════════════
     MATRIX VIEW
  ══════════════════════════════ */
  .matrix-toolbar {
    display: flex;
    gap: 8px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
  }

  .lift-filter-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .matrix-container {
    padding: 16px 20px;
    overflow-x: auto;
  }

  .matrix-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(138px, 1fr));
    gap: 7px;
    min-width: 980px;
  }

  .row-label {
    grid-column: 1 / -1;
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 0 3px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1px;
  }

  .cell {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 9px;
    cursor: pointer;
    transition: border-color 0.12s, transform 0.12s;
    position: relative;
    user-select: none;
  }

  .cell:hover { border-color: var(--accent2); transform: translateY(-1px); }

  .cell.current-bench  { background: #c8a96e0f; border-color: var(--accent); }
  .cell.current-deadlift { background: #8ab4d40f; border-color: var(--accent2); }
  .cell.current-squat  { background: #d480800f; border-color: #d48080; }

  .cell-badge {
    position: absolute;
    top: -1px;
    right: -1px;
    font-size: 0.48rem;
    padding: 2px 4px;
    letter-spacing: 0.05em;
    font-weight: 700;
    line-height: 1;
  }
  .badge-bench    { background: var(--accent); color: #000; }
  .badge-deadlift { background: var(--accent2); color: #000; }
  .badge-squat    { background: #d48080; color: #000; }

  .cell.done { opacity: 0.38; }
  .cell.done::after {
    content: '✓';
    position: absolute;
    top: 3px; right: 6px;
    color: #6db88a;
    font-size: 0.8rem;
  }

  .cell-header {
    font-size: 0.67rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 7px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
  }

  .cell-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 1.5px 0;
    font-size: 0.68rem;
  }

  .cell-rl { color: var(--muted); font-size: 0.62rem; min-width: 26px; }
  .cell-w  { font-weight: 700; font-size: 0.78rem; }
  .cell-t  { font-size: 0.54rem; letter-spacing: 0.03em; }

  .ce { color: #6db88a; }
  .cs { color: #d48080; }
  .cp { color: var(--accent); }
  .cb { color: var(--accent2); }

  .cell-div { border-top: 1px solid #222; margin: 3px 0; }

  .new-badge {
    display: inline-block;
    background: #2a5a3a;
    color: #6db88a;
    font-size: 0.5rem;
    padding: 1px 3px;
    margin-left: 4px;
    letter-spacing: 0.04em;
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: sticky;
    bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
    font-size: 0.7rem;
    color: var(--muted);
    z-index: 100;
  }

  .bottom-bar strong { color: var(--accent); }

  @media (max-width: 600px) {
    .week-view { padding: 14px; }
    .matrix-container { padding: 10px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Power Matrix</h1>
    <p>BENCH · DEADLIFT · SQUAT &nbsp;|&nbsp; Complete every rep before advancing.</p>
  </div>
</header>

<div class="tab-bar">
  <div class="tab active" onclick="showView('week')">📋 This Week</div>
  <div class="tab" onclick="showView('matrix')">🔢 Full Matrix</div>
</div>

<!-- ══ THIS WEEK VIEW ══ -->
<div id="weekView" class="view active">
  <div class="week-view">
    <div id="weekContent"></div>
  </div>
</div>

<!-- ══ MATRIX VIEW ══ -->
<div id="matrixView" class="view">
  <div class="matrix-toolbar">
    <span class="lift-filter-label">Viewing:</span>
    <button class="btn active" id="filterBench"    onclick="setFilter('bench')">Bench</button>
    <button class="btn"        id="filterDeadlift" onclick="setFilter('deadlift')">Deadlift</button>
    <button class="btn"        id="filterSquat"    onclick="setFilter('squat')">Squat</button>
    <input type="text" placeholder="Jump to weight…" oninput="jumpToCell(this.value)" style="margin-left:auto;" />
  </div>
  <div class="matrix-container">
    <div class="matrix-grid" id="matrixGrid"></div>
  </div>
</div>

<div class="bottom-bar" id="bottomBar">
  <span id="bottomInfo">Go to the Matrix tab, pick a lift, and click a cell to set your starting position.</span>
</div>

<script>
// ─────────────────────────────────────────
// DATA
// ─────────────────────────────────────────
const MATRIX = [
  ["100-105",70,80,85,90,80],["110-115",90,100,105,110,100],["120-125",95,100,110,115,100],
  ["130-135",100,105,115,120,105],["140-145",105,110,120,130,110],["150-155",110,115,125,140,115],
  ["160-165",110,120,130,150,120],["170-175",130,145,155,160,140],["180-185",130,150,160,170,145],
  ["190-195",135,155,165,175,150],["200-205",140,160,170,180,155],["210-215",145,165,175,195,165],
  ["220-225",150,170,180,210,170],["230-235",160,180,190,215,165],["240-245",165,190,200,225,145],
  ["250-255",170,195,210,235,200],["260-265",175,205,215,255,200],["270-275",180,210,220,255,210],
  ["280-285",165,215,225,260,215],["290-295",190,220,230,270,220],["300-305",200,230,240,280,225],
  ["310-315",200,235,250,290,230],["320-325",210,245,265,295,230],["330-335",210,250,270,300,250],
  ["340-345",215,255,275,310,255],["350-355",215,260,280,320,260],["360-365",220,265,285,330,270],
  ["370-375",220,270,300,345,275],["380-385",225,275,315,360,275],["390-395",225,280,320,365,280],
  ["400-405",230,285,325,370,280],["410-415",230,290,330,375,300],["420-425",235,295,340,385,310],
  ["430-435",255,305,350,400,320],["440-445",260,315,360,415,325],["450-455",260,325,375,425,335],
  ["460-465",265,335,390,435,350],["470-475",270,345,405,445,355],["480-485",275,355,420,455,360],
  ["490-495",275,365,435,465,370],["500-505",280,375,445,470,375],["510-515",280,380,455,480,380],
  ["520-525",295,385,465,490,385],["530-535",300,390,470,500,390],["540-545",310,400,475,510,400],
  ["550-555",315,405,485,520,405],["560-565",320,410,490,525,410],["570-575",325,415,495,530,415],
  ["580-585",330,420,500,540,425],["590-595",340,430,510,555,430],["600-605",345,435,515,565,435],
  ["610-615",350,440,520,575,440],["620-625",355,445,525,585,445],["630-635",360,450,530,595,450],
  ["640-645",365,455,535,600,460],["650-655",370,460,540,610,470],["660-665",385,480,550,625,480],
  ["670-675",380,490,555,635,490],["680-685",395,500,560,645,500],
  ["690-695",400,505,565,655,505], // ADDED — was missing from original
  ["700-705",400,505,565,665,500],["710-715",405,510,570,675,510],
  ["720-725",410,515,580,685,515],["730-735",420,525,585,700,525],
];

const LIFT_META = {
  bench:    { label: 'Bench Press',  day: 'Push Day',  color: 'var(--accent)',  cls: 'bench' },
  deadlift: { label: 'Deadlift',     day: 'Pull Day',  color: 'var(--accent2)', cls: 'deadlift' },
  squat:    { label: 'Back Squat',   day: 'Leg Day',   color: '#d48080',        cls: 'squat' },
};

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
const STATE = {
  bench:    { current: null, completed: [] },
  deadlift: { current: null, completed: [] },
  squat:    { current: null, completed: [] },
};

let activeFilter = 'bench';
let activeView = 'week';

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('pm_v3') || '{}');
    ['bench','deadlift','squat'].forEach(l => {
      if (s[l]) {
        STATE[l].current = s[l].current ?? null;
        STATE[l].completed = s[l].completed || [];
      }
    });
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem('pm_v3', JSON.stringify(STATE)); } catch(e) {}
}

// ─────────────────────────────────────────
// VIEW SWITCHING
// ─────────────────────────────────────────
function showView(v) {
  activeView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(v === 'week' ? 'weekView' : 'matrixView').classList.add('active');
  document.querySelectorAll('.tab')[v === 'week' ? 0 : 1].classList.add('active');
  if (v === 'week') renderWeek();
  else renderMatrix();
}

// ─────────────────────────────────────────
// THIS WEEK VIEW
// ─────────────────────────────────────────
function renderWeek() {
  const container = document.getElementById('weekContent');
  const anySet = ['bench','deadlift','squat'].some(l => STATE[l].current !== null);

  if (!anySet) {
    container.innerHTML = `<div class="no-position">
      <span>↗</span>
      Go to the <strong>Full Matrix</strong> tab and click any cell for each lift to set your starting position.<br>
      Come back here and you'll see your complete week's workout formatted for Strong.
    </div>`;
    updateBottomBar();
    return;
  }

  // Progress strip
  let stripHTML = '<div class="progress-strip">';
  ['bench','deadlift','squat'].forEach(l => {
    const s = STATE[l];
    const pct = s.current !== null ? Math.round((s.completed.length / MATRIX.length) * 100) : 0;
    const label = s.current !== null ? MATRIX[s.current][0] : '—';
    const meta = LIFT_META[l];
    stripHTML += `<div class="progress-cell">
      <label>${meta.label}</label>
      <strong>${label}</strong><br>
      <span style="font-size:0.62rem;color:var(--muted)">${s.completed.length} / ${MATRIX.length} cells done</span>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%;background:${meta.color}"></div></div>
    </div>`;
  });
  stripHTML += '</div>';

  // Lift cards
  let cardsHTML = '<div class="lift-cards">';
  ['bench','deadlift','squat'].forEach(l => {
    const s = STATE[l];
    const meta = LIFT_META[l];
    if (s.current === null) {
      cardsHTML += `<div class="lift-card">
        <div class="lift-card-header">
          <span class="lift-name">${meta.label}</span>
          <span class="lift-day-tag">${meta.day}</span>
        </div>
        <div style="padding:24px 14px;text-align:center;font-size:0.72rem;color:var(--muted)">
          No position set.<br>Go to Full Matrix to set it.
        </div>
      </div>`;
      return;
    }
    const [label,r8,r5,r3,r1,back] = MATRIX[s.current];
    const sets = [
      { reps:8,  weight:r8,   type:'endurance', cls:'ce' },
      { reps:5,  weight:r5,   type:'endurance', cls:'ce' },
      { reps:3,  weight:r3,   type:'strength',  cls:'cs' },
      { reps:1,  weight:r1,   type:'power',     cls:'cp' },
      { reps:1,  weight:r1,   type:'power',     cls:'cp' },
      { reps:1,  weight:r1,   type:'power',     cls:'cp' },
      { reps:5,  weight:back, type:'backoff',   cls:'cb' },
    ];

    const copyText = `${meta.label} — Cell ${label}\n` + sets.map((s,i) =>
      `Set ${i+1}: ${s.reps} reps @ ${s.weight} lbs (${s.type})`).join('\n');

    cardsHTML += `<div class="lift-card">
      <div class="lift-card-header">
        <div>
          <span class="lift-name">${meta.label}</span>
          <span class="lift-cell-badge"> · cell ${label}</span>
        </div>
        <span class="lift-day-tag">${meta.day}</span>
      </div>
      <table class="strong-table">
        <thead><tr>
          <th>Set</th><th>Reps</th><th>Type</th><th>Weight (lbs)</th>
        </tr></thead>
        <tbody>`;

    sets.forEach((set, i) => {
      const divBefore = (i === 2 || i === 3 || i === 6);
      if (divBefore) cardsHTML += `<tr><td colspan="4" style="padding:0;height:1px;background:var(--border)"></td></tr>`;
      cardsHTML += `<tr>
        <td style="color:var(--muted);font-size:0.65rem">${i+1}</td>
        <td>${set.reps}</td>
        <td class="tag-${set.type}">${set.type.toUpperCase()}</td>
        <td><strong>${set.weight}</strong></td>
      </tr>`;
    });

    cardsHTML += `</tbody></table>
      <div class="copy-hint">
        <span>Enter these 7 sets into Strong under ${meta.label}</span>
        <button class="copy-btn" onclick="copyCard('${l}', this)"">Copy</button>
      </div>
    </div>`;

    // Store copy text on window
    window['_copy_'+l] = copyText;
  });
  cardsHTML += '</div>';

  // Nav
  const navHTML = `<div class="week-nav">
    <button class="btn" onclick="advanceLift('bench')"   ${STATE.bench.current===null||STATE.bench.current>=MATRIX.length-1?'disabled':''}>Bench → Next Cell</button>
    <button class="btn" onclick="advanceLift('deadlift')" ${STATE.deadlift.current===null||STATE.deadlift.current>=MATRIX.length-1?'disabled':''}>Deadlift → Next Cell</button>
    <button class="btn" onclick="advanceLift('squat')"   ${STATE.squat.current===null||STATE.squat.current>=MATRIX.length-1?'disabled':''}>Squat → Next Cell</button>
    <div class="week-nav-spacer"></div>
    <button class="btn" onclick="advanceAll()" style="border-color:#555;color:#aaa">✓ Advance All</button>
  </div>`;

  container.innerHTML = stripHTML + cardsHTML + navHTML;
  updateBottomBar();
}

function copyCard(lift, btn) {
  const text = window['_copy_'+lift] || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
  }).catch(() => {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1800);
  });
}

function advanceLift(lift) {
  const s = STATE[lift];
  if (s.current === null || s.current >= MATRIX.length - 1) return;
  s.completed.push(s.current);
  s.current++;
  saveState();
  renderWeek();
  renderMatrix();
}

function advanceAll() {
  ['bench','deadlift','squat'].forEach(l => {
    const s = STATE[l];
    if (s.current !== null && s.current < MATRIX.length - 1) {
      s.completed.push(s.current);
      s.current++;
    }
  });
  saveState();
  renderWeek();
  renderMatrix();
}

// ─────────────────────────────────────────
// MATRIX VIEW
// ─────────────────────────────────────────
function setFilter(lift) {
  activeFilter = lift;
  document.querySelectorAll('.matrix-toolbar .btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter' + lift.charAt(0).toUpperCase() + lift.slice(1)).classList.add('active');
  renderMatrix();
}

function renderMatrix() {
  const grid = document.getElementById('matrixGrid');
  const s = STATE[activeFilter];
  const rowStarts = [100,170,240,310,380,450,520,590,660];
  const rowLabels = ['100–165','170–235','240–305','310–375','380–445','450–515','520–585','590–655','660–735'];

  let html = '';
  let rowIdx = -1;

  MATRIX.forEach((cell, idx) => {
    const [label,r8,r5,r3,r1,back] = cell;
    const base = parseInt(label);
    const newRow = rowStarts.findIndex(rs => base >= rs && base < rs + 70);

    if (newRow > rowIdx) {
      rowIdx = newRow;
      html += `<div class="row-label">Row ${rowIdx+1} &nbsp;·&nbsp; ${rowLabels[rowIdx]}</div>`;
    }

    const isCurrent = s.current === idx;
    const isDone = s.completed.includes(idx);
    const isNew = label === '690-695';

    // Any lift currently on this cell?
    const badges = ['bench','deadlift','squat'].filter(l => STATE[l].current === idx);

    let cls = 'cell';
    if (isCurrent) cls += ` current-${activeFilter}`;
    if (isDone) cls += ' done';

    const badgeHTML = badges.map(l =>
      `<span class="cell-badge badge-${l}">${l === 'bench' ? 'B' : l === 'deadlift' ? 'D' : 'S'}</span>`
    ).join('');

    html += `<div class="${cls}" onclick="cellClick(${idx})">
      ${badgeHTML}
      <div class="cell-header">${label}${isNew ? '<span class="new-badge">NEW</span>' : ''}</div>
      <div class="cell-row"><span class="cell-rl">8×</span><span class="cell-w ce">${r8}</span><span class="cell-t ce">endurance</span></div>
      <div class="cell-row"><span class="cell-rl">5×</span><span class="cell-w ce">${r5}</span><span class="cell-t ce">endurance</span></div>
      <div class="cell-div"></div>
      <div class="cell-row"><span class="cell-rl">3×</span><span class="cell-w cs">${r3}</span><span class="cell-t cs">strength</span></div>
      <div class="cell-div"></div>
      <div class="cell-row"><span class="cell-rl">1×</span><span class="cell-w cp">${r1}</span><span class="cell-t cp">power</span></div>
      <div class="cell-row"><span class="cell-rl">1×</span><span class="cell-w cp">${r1}</span><span class="cell-t cp">power</span></div>
      <div class="cell-row"><span class="cell-rl">1×</span><span class="cell-w cp">${r1}</span><span class="cell-t cp">power</span></div>
      <div class="cell-div"></div>
      <div class="cell-row"><span class="cell-rl">5×</span><span class="cell-w cb">${back}</span><span class="cell-t cb">backoff</span></div>
    </div>`;
  });

  grid.innerHTML = html;
  updateBottomBar();
}

function cellClick(idx) {
  const s = STATE[activeFilter];
  if (s.current === idx) {
    // double-click = mark done + advance
    if (!s.completed.includes(idx)) s.completed.push(idx);
    s.current = Math.min(idx + 1, MATRIX.length - 1);
  } else {
    s.current = idx;
  }
  saveState();
  renderMatrix();
  if (activeView === 'week') renderWeek();
}

function jumpToCell(val) {
  const num = parseInt(val);
  if (isNaN(num)) return;
  const idx = MATRIX.findIndex(c => parseInt(c[0]) >= num);
  if (idx >= 0) {
    const cells = document.querySelectorAll('.cell');
    if (cells[idx]) cells[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

// ─────────────────────────────────────────
// BOTTOM BAR
// ─────────────────────────────────────────
function updateBottomBar() {
  const parts = ['bench','deadlift','squat'].map(l => {
    const s = STATE[l];
    const meta = LIFT_META[l];
    if (s.current === null) return `<span>${meta.label}: <em style="color:var(--muted)">not set</em></span>`;
    return `<span>${meta.label}: <strong style="color:${meta.color}">${MATRIX[s.current][0]}</strong></span>`;
  });
  document.getElementById('bottomInfo').innerHTML = parts.join(' &nbsp;·&nbsp; ');
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
loadState();
renderWeek();
renderMatrix();
</script>
</body>
</html>
